services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ira-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  opensearch:
    image: opensearchproject/opensearch:3.3.2
    container_name: ira-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      # Skip demo security bootstrap (avoids OPENSEARCH_INITIAL_ADMIN_PASSWORD restart loop)
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

volumes:
  qdrant_storage:
  opensearch_data:
